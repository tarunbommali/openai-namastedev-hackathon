services:
  app:
    build:
      context: .
      dockerfile: Dockerfile
    restart: unless-stopped
    ports:
      - "80:80"
      - "4000:4000"
      - "8001:8001"
    environment:
      OPENAI_API_KEY: ${OPENAI_API_KEY:-}
      JWT_ACCESS_SECRET: ${JWT_ACCESS_SECRET:-compose-dev-access-secret-change-me-32}
      JWT_REFRESH_SECRET: ${JWT_REFRESH_SECRET:-compose-dev-refresh-secret-change-me-32}
    healthcheck:
      test: ["CMD", "curl", "-sf", "http://localhost/api/health"]
      interval: 15s
      timeout: 5s
      retries: 5
